name: Sync Dynamic Inputs

on:
  push:
    branches: [main]
    paths:
      - '.github/config/dynamic-inputs.json'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_DISPATCH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate config JSON
        run: python3 -c "import json; json.load(open('.github/config/dynamic-inputs.json'))"

      - name: Create sync branch
        id: branch
        run: |
          BRANCH="iac/config-sync/$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Run sync (surgical text patch, no full-file rewrite)
        run: |
          python3 << 'PYEOF'
          import json
          import re
          from pathlib import Path

          REPO_ROOT = Path(".").resolve()
          CONFIG_PATH = REPO_ROOT / ".github/config/dynamic-inputs.json"
          WORKFLOWS_DIR = REPO_ROOT / ".github/workflows"

          FIELDS = ["project_name", "environment", "subscription", "location", "instance"]
          QUOTED_FIELDS = {"instance"}

          def load_config():
              with open(CONFIG_PATH) as f:
                  return json.load(f)

          def target_files(config):
              exclude = set(config.get("exclude_workflows", []))
              targets = config.get("target_workflows", ["all"])
              if targets == ["all"]:
                  return sorted(f for f in WORKFLOWS_DIR.glob("*.y*ml") if f.name not in exclude)
              return [WORKFLOWS_DIR / t for t in targets if (WORKFLOWS_DIR / t).exists()]

          def build_values(field_name, config):
              if field_name == "project_name":
                  pn = config["project_name"]
                  return [pn["placeholder"]] + pn["values"]
              if field_name == "subscription":
                  return list(config["subscription"].keys())
              return list(config[field_name])

          def format_item(value, force_quote):
              s = str(value)
              if force_quote:
                  return '"' + s.replace('"', '\\"') + '"'
              special = [":", "#", "[", "]", "{", "}", ",", "&", "*", "!", "|", ">", "'", '"', "%", "@", "`"]
              needs_quote = (
                  s == "" or
                  any(c in s for c in special) or
                  (s and s[0] in " -?") or
                  s != s.strip()
              )
              if needs_quote:
                  return '"' + s.replace('"', '\\"') + '"'
              return s

          def patch_field(text, field_name, new_values, force_quote):
              field_re = re.compile(r'(?m)^([ \t]*)' + re.escape(field_name) + r':[ \t]*\r?\n')
              m = field_re.search(text)
              if not m:
                  return text, False

              field_indent = m.group(1)
              block_start = m.end()
              rest = text[block_start:]
              lines = rest.splitlines(keepends=True)

              block_end_offset = 0
              for line in lines:
                  if line.strip() == "":
                      block_end_offset += len(line)
                      continue
                  indent_len = len(line) - len(line.lstrip(" "))
                  if indent_len <= len(field_indent):
                      break
                  block_end_offset += len(line)

              block_text = rest[:block_end_offset]

              options_re = re.compile(r'(?m)^([ \t]*)options:[ \t]*(\[[^\n]*\])?[ \t]*\r?\n')
              om = options_re.search(block_text)
              if not om:
                  return text, False

              options_indent = om.group(1)
              inline_value = om.group(2)

              if inline_value is not None:
                  new_inline = "[" + ", ".join(format_item(v, force_quote) for v in new_values) + "]"
                  new_line = f"{options_indent}options: {new_inline}\n"
                  if om.group(0).rstrip("\r\n") == new_line.rstrip("\n"):
                      return text, False
                  new_block_text = block_text[:om.start()] + new_line + block_text[om.end():]
              else:
                  after = block_text[om.end():]
                  after_lines = after.splitlines(keepends=True)
                  item_indent = None
                  consumed = 0
                  for line in after_lines:
                      if line.strip() == "":
                          break
                      stripped = line.lstrip(" ")
                      cur_indent = len(line) - len(stripped)
                      if not stripped.startswith("-"):
                          break
                      if item_indent is None:
                          item_indent = cur_indent
                      elif cur_indent != item_indent:
                          break
                      consumed += len(line)

                  indent_str = " " * item_indent if item_indent is not None else options_indent + "  "
                  new_items_text = "".join(f"{indent_str}- {format_item(v, force_quote)}\n" for v in new_values)
                  old_items_text = after[:consumed]
                  if old_items_text == new_items_text:
                      return text, False
                  new_block_text = block_text[:om.end()] + new_items_text + after[consumed:]

              new_text = text[:block_start] + new_block_text + rest[block_end_offset:]
              return new_text, True

          def build_subscription_id_expr(subscription_map):
              keys = list(subscription_map.keys())
              parts = []
              for i, key in enumerate(keys):
                  value = subscription_map[key]
                  if i == len(keys) - 1:
                      parts.append("'" + value + "'")
                  else:
                      parts.append("inputs.subscription == '" + key + "' && '" + value + "'")
              return " || ".join(parts)

          def find_block_by_key(text, key_name):
              key_re = re.compile(r'(?m)^([ \t]*)' + re.escape(key_name) + r':[ \t]*\|?[ \t]*\r?\n')
              m = key_re.search(text)
              if not m:
                  return None
              indent = m.group(1)
              block_start = m.end()
              rest = text[block_start:]
              lines = rest.splitlines(keepends=True)
              block_end_offset = 0
              for line in lines:
                  if line.strip() == "":
                      block_end_offset += len(line)
                      continue
                  indent_len = len(line) - len(line.lstrip(" "))
                  if indent_len <= len(indent):
                      break
                  block_end_offset += len(line)
              return indent, block_start, rest[:block_end_offset]

          def patch_subscription_id(text, subscription_map):
              expr = build_subscription_id_expr(subscription_map)
              dollar = chr(36)
              brace_open = "{" + "{"
              brace_close = "}" + "}"
              new_value = dollar + brace_open + " " + expr + " " + brace_close

              found = find_block_by_key(text, "tfvars_json")
              if not found:
                  return text, False
              _, block_start, block_text = found

              sub_id_re = re.compile(r'(?m)^([ \t]*)"subscription_id":[ \t]*"[^\n]*"([ \t]*,?)[ \t]*\r?\n')
              sm = sub_id_re.search(block_text)
              if sm:
                  indent = sm.group(1)
                  trailing_comma = sm.group(2) or ","
                  new_line = indent + '"subscription_id": "' + new_value + '"' + trailing_comma + "\n"
                  if sm.group(0) == new_line:
                      return text, False
                  new_block_text = block_text[:sm.start()] + new_line + block_text[sm.end():]
                  new_text = text[:block_start] + new_block_text + text[block_start + len(block_text):]
                  return new_text, True

              brace_re = re.compile(r'(?m)^([ \t]*)\{[ \t]*\r?\n')
              bm = brace_re.search(block_text)
              if not bm:
                  return text, False

              brace_indent = bm.group(1)
              after_brace = block_text[bm.end():]
              first_key_match = re.search(r'(?m)^([ \t]*)"', after_brace)
              key_indent = first_key_match.group(1) if first_key_match else brace_indent + "  "

              new_line = key_indent + '"subscription_id": "' + new_value + '",' + "\n"
              insert_pos = bm.end()
              new_block_text = block_text[:insert_pos] + new_line + block_text[insert_pos:]
              new_text = text[:block_start] + new_block_text + text[block_start + len(block_text):]
              return new_text, True

          def update_file(path, config):
              text = path.read_text()
              original = text
              any_changed = False

              for field_name in FIELDS:
                  if not re.search(r'(?m)^[ \t]*' + re.escape(field_name) + r':[ \t]*\r?\n', text):
                      continue
                  new_values = build_values(field_name, config)
                  force_quote = field_name in QUOTED_FIELDS
                  text, changed = patch_field(text, field_name, new_values, force_quote)
                  any_changed = any_changed or changed

              if "subscription" in config and re.search(r'(?m)^[ \t]*tfvars_json:[ \t]*\|', text):
                  text, sub_id_changed = patch_subscription_id(text, config["subscription"])
                  any_changed = any_changed or sub_id_changed

              if any_changed and text != original:
                  path.write_text(text)
              return any_changed

          def main():
              config = load_config()
              files = target_files(config)
              if not files:
                  print("No target workflow files found.")
                  return
              changed_files = []
              for path in files:
                  try:
                      if update_file(path, config):
                          changed_files.append(path.name)
                          print(f"Updated: {path.name}")
                      else:
                          print(f"No change needed: {path.name}")
                  except Exception as e:
                      print(f"::warning::Failed to process {path.name}: {e}")
              Path("sync_summary.txt").write_text("\n".join(changed_files))

          main()
          PYEOF

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- .github/workflows/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/
          git commit -m "chore: sync workflow inputs from dynamic-inputs.json"
          git push origin "${{ steps.branch.outputs.branch }}"

      - name: Ensure GitHub CLI
        if: steps.diff.outputs.changed == 'true'
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            echo "gh not found, downloading portable binary (no sudo required)..."
            GH_VERSION="2.63.2"
            ARCH=$(uname -m)
            case "$ARCH" in
              x86_64) GH_ARCH="amd64" ;;
              aarch64|arm64) GH_ARCH="arm64" ;;
              *) echo "::error::Unsupported architecture: $ARCH"; exit 1 ;;
            esac

            INSTALL_DIR="$HOME/.local/gh-cli"
            mkdir -p "$INSTALL_DIR"

            curl -sSL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_${GH_ARCH}.tar.gz" -o /tmp/gh.tar.gz
            tar -xzf /tmp/gh.tar.gz -C "$INSTALL_DIR" --strip-components=1
            rm /tmp/gh.tar.gz

            echo "$INSTALL_DIR/bin" >> "$GITHUB_PATH"
            echo "Installed gh to $INSTALL_DIR/bin"
          else
            echo "gh already available: $(command -v gh)"
          fi

      - name: Open Pull Request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_DISPATCH_PAT }}
        run: |
          CHANGED=$(cat sync_summary.txt | tr '\n' ',' | sed 's/,$//')
          gh pr create \
            --title "chore: sync dynamic inputs from config" \
            --body "Auto-generated: updated dropdown options in: ${CHANGED}. Source: .github/config/dynamic-inputs.json" \
            --base main \
            --head "${{ steps.branch.outputs.branch }}"

      - name: No changes
        if: steps.diff.outputs.changed == 'false'
        run: echo "Config produced no diff — nothing to PR."
