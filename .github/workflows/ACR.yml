name: ACR
run-name: >-
  ${{ format('Provision ACR - {0}', (inputs.acr_name != '' && format('{0}{1}{2}{3}', inputs.acr_name, inputs.environment, inputs.location, inputs.instance)) || inputs.project_name) }}

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: Project Name
        required: true
        type: choice
        options: [Select project name, WFI, VCNG, LA]
      custom_project_name:
        description: Is your project name not listed? Check this box and enter your project name below.
        required: false
        type: boolean
      custom_project_name_value:
        description: Enter your project name (if not listed above)
        required: false
        type: string
      environment:
        description: Environment
        required: true
        type: choice
        options: [dev, qa, staging, prod]
      subscription:
        description: Azure Subscription (logical name)
        required: true
        type: choice
        options:
        - AZU-IA-PSS-VCE-WFI-N
        - AZU-IA-PSS-SOF-SHARED-N
        - AZU-IA-PSS-SOF-sharedqa-N
        - AZU-IA-PSS-SOF-SHARED-P
        - AZU-IA-PSS-VCE-WFI-P
        - AZU-IA-PSS-VCNG-SHARED-N
        - AZU-IA-PSS-VCNG-SHARED-P
        - AZU-IA-PSS-LA-SHARED-N
        - AZU-IA-PSS-LA-SHARED-P
      owner:
        description: Owner or team responsible for these resources (used for tagging and accountability).
        required: true
      resource_group_name:
        description: Resource Group Name
        required: true
      location:
        description: Azure Region
        required: true
        type: choice
        options: [eastus, northeurope, westus]
      instance:
        description: Instance Number. Used to uniquely identify and differentiate multiple deployments of the same service within the same environment
        required: true
        type: choice
        options: ["001", "002", "003", "004", "005", "006", "007", "008", "009", "010"]
      acr_name:
        description: >
          ACR Name Prefix (e.g., wfiacr). Provide this to create a new ACR.
        required: false
      acr_sku:
        description: The SKU name of the container registry. Possible values are Basic, Standard and Premium.
        required: true
        type: choice
        options: [Basic, Standard, Premium]
      public_network_access_enabled:
        description: Whether public network access is allowed for the container registry.
        required: false
        type: boolean
        default: false
      admin_enabled:
        description: Specifies whether the admin user is enabled.
        required: false
        type: boolean
        default: false
      pve_vnet_name:
        description: Private endpoint VNET name
        required: false
      pve_subnet_name:
        description: Private endpoint Subnet name
        required: false
      pve_vnet_resource_group_name:
        description: Private endpoint Vnet Resource Group Name
        required: false

jobs:
  provision:
    uses: HON-IA/pss_cf_mod_reusable_templates/.github/workflows/iac-service-provision.yml@feature/vamsi/iac
    secrets: inherit
    with:
      working_directory: "ACR"
      subscription: ${{ inputs.subscription }}
      tfvars_json: |
        {
          "subscription_id": "${{ inputs.subscription == 'AZU-IA-PSS-VCE-WFI-N' && '7f0a6fce-e069-4b41-99e8-88d1ece5c29a' || inputs.subscription == 'AZU-IA-PSS-SOF-SHARED-N' && '8ee99bd0-1b69-47eb-9b6e-746e2ed94c26' || inputs.subscription == 'AZU-IA-PSS-SOF-sharedqa-N' && 'a1b2c3d4-1111-4a2b-9c3d-1e2f3a4b5c6d' || inputs.subscription == 'AZU-IA-PSS-SOF-SHARED-P' && 'b2c3d4e5-2222-4b3c-8d4e-2f3a4b5c6d7e' || inputs.subscription == 'AZU-IA-PSS-VCE-WFI-P' && 'c3d4e5f6-3333-4c4d-7e5f-3a4b5c6d7e8f' || inputs.subscription == 'AZU-IA-PSS-VCNG-SHARED-N' && 'd4e5f6a7-4444-4d5e-6f7a-4b5c6d7e8f9a' || inputs.subscription == 'AZU-IA-PSS-VCNG-SHARED-P' && 'e5f6a7b8-5555-4e6f-5a7b-5c6d7e8f9a0b' || inputs.subscription == 'AZU-IA-PSS-LA-SHARED-N' && 'f6a7b8c9-6666-4f7a-4b8c-6d7e8f9a0b1c' || 'a7b8c9d0-7777-4a8b-3c9d-7e8f9a0b1c2d' }}",
          "resource_group_name": "${{ inputs.resource_group_name }}",
          "location": "${{ inputs.location }}",
          "acr_sku": "${{ inputs.acr_sku }}",
          "public_network_access_enabled": ${{ inputs.public_network_access_enabled }},
          "admin_enabled": ${{ inputs.admin_enabled }},
          "pve_vnet_name": "${{ inputs.pve_vnet_name }}",
          "pve_subnet_name": "${{ inputs.pve_subnet_name }}",
          "pve_vnet_resource_group_name": "${{ inputs.pve_vnet_resource_group_name }}",
          "owner": "${{ inputs.owner }}",
          "acr_name": "${{ inputs.acr_name != '' && format('{0}{1}{2}{3}', inputs.acr_name, inputs.environment, inputs.location, inputs.instance) }}"
        }
      application_name: ${{ inputs.custom_project_name && inputs.custom_project_name_value || inputs.project_name }}
      environment: ${{ inputs.environment }}
      service_name: "ACR"
      instance: ${{ inputs.instance }}
      location: ${{ inputs.location }}
      resource_name_override: ${{ inputs.acr_name != '' && format('{0}{1}{2}{3}', inputs.acr_name, inputs.environment, inputs.location, inputs.instance) }}
